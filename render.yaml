services:
  - type: web
    name: mayfairfx-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TRUST_PROXY
        value: "1"
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FREECRYPTOAPI_KEY
        sync: false
      - key: BITCART_ENABLED
        sync: false
      - key: BITCART_API_URL
        sync: false
      - key: BITCART_API_KEY
        sync: false
      - key: BITCART_STORE_ID
        sync: false
      - key: BITCART_INVOICE_PATH
        sync: false
      - key: BITCART_AUTH_SCHEME
        sync: false
      - key: BITCART_WEBHOOK_URL
        sync: false
      - key: BITCART_WEBHOOK_SECRET
        sync: false
      - key: BITCART_REDIRECT_URL
        sync: false
      - key: AUTH_COOKIE_SAMESITE
        value: none
      - key: AUTH_COOKIE_SECURE
        value: "true"
