services:
  - type: web
    name: investment-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TRUST_PROXY
        value: "1"
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FREECRYPTOAPI_KEY
        sync: false
      - key: AUTH_COOKIE_SAMESITE
        value: none
      - key: AUTH_COOKIE_SECURE
        value: "true"
